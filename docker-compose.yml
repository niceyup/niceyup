services:
  postgres:
    image: bitnami/postgresql
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: niceyup-db
    volumes:
      - postgres-data:/bitnami/postgresql

  redis:
    image: bitnami/redis
    ports:
      - 6379:6379
    environment:
      ALLOW_EMPTY_PASSWORD: yes
    volumes:
      - redis-data:/bitnami/redis/data

volumes:
  postgres-data:
  redis-data:
